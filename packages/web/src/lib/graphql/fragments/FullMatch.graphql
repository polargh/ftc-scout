fragment FullMatch on Match {
    season
    eventCode
    id
    matchNum
    series
    description
    tournamentLevel
    scheduledStartTime
    actualStartTime
    videoEmbedURL
    videoClipfarmURL
    scores {
        ...FullMatchScores
    }
    teams {
        season
        eventCode
        matchId
        station
        allianceRole
        alliance
        teamNumber
        team {
            number
            name
        }
        surrogate
        noShow
        dq
        onField
    }
}
